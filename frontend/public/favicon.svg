<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#2d3020"/>
  <!-- Globe outline -->
  <circle cx="16" cy="16" r="10" stroke="#c9a46a" stroke-width="1.5" fill="none"/>
  <!-- Vertical center line -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="#c9a46a" stroke-width="1.5"/>
  <!-- Horizontal center line -->
  <line x1="6" y1="16" x2="26" y2="16" stroke="#c9a46a" stroke-width="1.5"/>
  <!-- Upper latitude arc -->
  <path d="M 8.5 11 Q 16 9 23.5 11" stroke="#c9a46a" stroke-width="1.5" fill="none"/>
  <!-- Lower latitude arc -->
  <path d="M 8.5 21 Q 16 23 23.5 21" stroke="#c9a46a" stroke-width="1.5" fill="none"/>
  <!-- Left longitude arc -->
  <path d="M 16 6 Q 10 16 16 26" stroke="#c9a46a" stroke-width="1.5" fill="none"/>
  <!-- Right longitude arc -->
  <path d="M 16 6 Q 22 16 16 26" stroke="#c9a46a" stroke-width="1.5" fill="none"/>
</svg>
